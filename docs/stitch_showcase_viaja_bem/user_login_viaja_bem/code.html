<!DOCTYPE html>

<html lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0DBDC2", // Teal Primary CTA
                        "secondary": "#FFA915", // Amber Accent
                        "background-light": "#F7F2E8", // Cream Background
                        "background-dark": "#1F1F1F", // Deep Slate
                        "slate-text": "#1F1F1F",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center">
<!-- Split Screen Container -->
<div class="flex min-h-screen w-full overflow-hidden">
<!-- Left Side: Scenic Image (Hidden on mobile) -->
<div class="hidden lg:flex lg:w-1/2 relative bg-primary/20">
<div class="absolute inset-0 bg-cover bg-center" data-alt="Beautiful tropical beach with crystal clear water and white sand" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCZcI1t2FA8ILz4BCM9sEGEQ9tUhWc1m8mDfo85KXUrwH7QQKZdXghkT55fNoHwvNXZcvGaRkaN8y3a3LYg_klm3KB4Si0ZMqYoAgfJ1-w5C41xu4DXVOIB-LqtyPrIKTOuZWbqrUR_bBqkh_-UeL46h_ySMx8852wIMBkXPaOZanfgRG1eLh17ajvi0PcSC7mV-sxM8l4CuqIgIUKgpwlFIVRf7m_4YSMOcG1XUUUdSPI7yLVYvnIVCnt1ytGg0OSc5kNG0t6uYw");'>
</div>
<div class="absolute inset-0 bg-gradient-to-t from-background-dark/40 to-transparent"></div>
<div class="absolute bottom-12 left-12 text-white max-w-md">
<h3 class="text-4xl font-bold mb-4">Descubra novos horizontes com a Viaja Bem.</h3>
<p class="text-lg opacity-90">Sua próxima aventura começa com um simples clique.</p>
</div>
</div>
<!-- Right Side: Login Panel -->
<div class="w-full lg:w-1/2 flex flex-col bg-background-light dark:bg-background-dark">
<!-- Mobile Top Bar Style -->
<div class="flex items-center p-6 justify-center lg:justify-start">
<img alt="Viaja Bem Logo" class="h-10 lg:h-12" data-alt="Viaja Bem agency logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCsTS5KgP6ebf_aT9wUm7aHnLRDdPT52pT8vWVvhV25___yMfUZAVVHlzXvZ8PrtYoefIGErv3c1B_Qv_V03mN7HZL77k6ADwVkGO6veniDHILGVSAAr--gt8hEUlntUgse1QbcWiE5_jQtMnR03cbM2mgFiSLKuVmjVBTVI2fC1m5SUylJ6LZxw_PjWFY4mNsyIBJrCOlflEDjjpUPKgZEwC2p7FZy-YrgokhRwW0xeke-TEstIWcH_aip_niZHZX9Ynwq5QqORQ"/>
</div>
<div class="flex-1 flex flex-col justify-center px-6 sm:px-12 md:px-24 xl:px-32 pb-12">
<div class="mb-8">
<h1 class="text-slate-text dark:text-slate-100 text-3xl font-bold leading-tight tracking-tight mb-2">Acesse sua viagem</h1>
<p class="text-slate-text/70 dark:text-slate-300 text-base">Insira seus dados para acessar o seu voucher e roteiro completo.</p>
</div>
<!-- Tabs -->
<div class="flex border-b border-slate-text/10 mb-8">
<button class="flex-1 pb-4 border-b-2 border-primary text-slate-text dark:text-slate-100 font-bold text-sm tracking-wide">
                        Receber Código
                    </button>
<button class="flex-1 pb-4 border-b-2 border-transparent text-slate-text/40 dark:text-slate-400 font-bold text-sm tracking-wide">
                        Usar Senha
                    </button>
</div>
<!-- Form -->
<form class="space-y-6">
<div>
<label class="block text-sm font-semibold text-slate-text dark:text-slate-200 mb-2" for="identifier">Seu Email ou Telefone</label>
<input class="w-full h-[56px] px-4 rounded-lg border-2 border-slate-text/10 focus:border-primary focus:ring-0 bg-white dark:bg-slate-800 text-slate-text dark:text-white transition-colors" id="identifier" name="identifier" placeholder="exemplo@email.com ou (00) 00000-0000" type="text"/>
</div>
<button class="w-full h-[56px] bg-primary hover:bg-primary/90 text-white font-bold text-lg rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2" type="submit">
                        Enviar Código de Acesso
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Help/Footer Area -->
<div class="mt-12 space-y-4">
<div class="p-4 rounded-xl border-2 border-secondary/20 bg-secondary/5 flex items-start gap-4">
<span class="material-symbols-outlined text-secondary">help</span>
<div>
<p class="text-sm font-medium text-slate-text dark:text-slate-200">Não encontrou a reserva?</p>
<a class="inline-flex items-center gap-1 text-primary font-bold hover:underline" href="#">
<span class="material-symbols-outlined text-base">chat</span>
                                Fale com a agência via WhatsApp
                            </a>
</div>
</div>
<div class="flex items-center justify-center gap-6 pt-6">
<a class="text-xs text-slate-text/40 hover:text-primary uppercase tracking-widest font-bold" href="#">Termos de Uso</a>
<a class="text-xs text-slate-text/40 hover:text-primary uppercase tracking-widest font-bold" href="#">Privacidade</a>
</div>
</div>
</div>
<!-- Footer Small Image/Decoration for Mobile -->
<div class="lg:hidden h-32 w-full bg-cover bg-center mt-auto" data-alt="Scenic landscape of a mountain lake" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuD0qtpfkSkh3raYPIUj9zW62v8uCOZxnK1ReobO6fcYIw1W2PL-b8KyT57Ejct8BM_WodHlVMeuizVrDam9Zga6ZtguHfHq7oXRRgra8WAh9C-ZpLEGfOoqpdToYrgcpIGlTTqS3F2n1iRBKiwFK1mewS5nR9qsJxemHcIJJHKgo1rqh1IqRoEjyGZNB4JJEx2i0oysndUS7A5qLfKKm4T3LInkjWwQ96DgcZFstqIsbTopj-G9pKJqKda5dvLjlFhvjtDn5W3L0w");'>
</div>
</div>
</div>
</body></html>
