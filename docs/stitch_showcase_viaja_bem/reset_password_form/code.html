<!DOCTYPE html>

<html lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ffa914",
                        "accent-teal": "#0DBDC2",
                        "background-light": "#F7F2E8",
                        "background-dark": "#231c0f",
                        "neutral-dark": "#1F1F1F",
                        "border-soft": "#eadfcd",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Viaja Bem | Redefinir Senha</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4">
<!-- Central Card Container -->
<div class="w-full max-w-[440px] bg-white dark:bg-neutral-900 rounded-xl shadow-xl overflow-hidden border border-border-soft dark:border-neutral-800">
<!-- Header Section -->
<div class="pt-10 pb-6 px-8 flex flex-col items-center text-center">
<div class="bg-primary/10 p-4 rounded-full mb-4">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="shield_lock">
                    shield_lock
                </span>
</div>
<h1 class="text-neutral-dark dark:text-slate-100 text-2xl font-bold tracking-tight">
                Definir Nova Senha
            </h1>
<p class="text-slate-500 dark:text-slate-400 mt-2 text-sm">
                Sua nova senha deve ser diferente das senhas anteriores por questões de segurança.
            </p>
</div>
<!-- Form Section -->
<div class="px-8 pb-10">
<form action="#" class="space-y-6">
<!-- New Password Field -->
<div class="flex flex-col gap-2">
<label class="text-neutral-dark dark:text-slate-200 text-sm font-semibold">
                        Nova Senha
                    </label>
<div class="relative group">
<input class="w-full h-12 px-4 rounded-lg border border-border-soft dark:border-neutral-700 bg-white dark:bg-neutral-800 text-neutral-dark dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-accent-teal focus:border-accent-teal transition-all duration-200 outline-none" placeholder="Mínimo 8 caracteres" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-accent-teal transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">
                                visibility
                            </span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="flex flex-col gap-2">
<label class="text-neutral-dark dark:text-slate-200 text-sm font-semibold">
                        Confirmar Nova Senha
                    </label>
<div class="relative group">
<input class="w-full h-12 px-4 rounded-lg border border-border-soft dark:border-neutral-700 bg-white dark:bg-neutral-800 text-neutral-dark dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-accent-teal focus:border-accent-teal transition-all duration-200 outline-none" placeholder="Repita a nova senha" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-accent-teal transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">
                                visibility
                            </span>
</button>
</div>
</div>
<!-- Submit Button -->
<div class="pt-2">
<button class="w-full h-12 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg shadow-md shadow-primary/20 transition-all active:scale-[0.98]" type="submit">
                        Redefinir Senha
                    </button>
</div>
</form>
<!-- Footer Link -->
<div class="mt-8 pt-6 border-t border-slate-100 dark:border-neutral-800 flex justify-center">
<a class="flex items-center gap-2 text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-primary transition-colors group" href="#">
<span class="material-symbols-outlined text-base group-hover:-translate-x-1 transition-transform" data-icon="arrow_back">
                        arrow_back
                    </span>
                    Voltar para o Login
                </a>
</div>
</div>
</div>
<!-- Bottom Nav for Mobile UI consistency if needed by user context -->
<div class="fixed bottom-0 left-0 right-0 md:hidden bg-white/80 backdrop-blur-md border-t border-border-soft px-6 py-2 flex justify-between items-center dark:bg-neutral-900/80 dark:border-neutral-800">
<a class="flex flex-col items-center p-2 text-slate-400" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
</a>
<a class="flex flex-col items-center p-2 text-primary" href="#">
<span class="material-symbols-outlined" data-icon="lock_reset">lock_reset</span>
</a>
<a class="flex flex-col items-center p-2 text-slate-400" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
</a>
</div>
</body></html>
