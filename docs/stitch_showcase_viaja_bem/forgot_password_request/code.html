<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ffa915",
                        "brand-teal": "#0dbdc2",
                        "background-light": "#f7f2e8",
                        "background-dark": "#231c0f",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .focus-teal:focus { border-color: #0dbdc2 !important; --tw-ring-color: #0dbdc2 !important; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md bg-white dark:bg-slate-900 rounded-xl shadow-xl overflow-hidden border border-slate-200 dark:border-slate-800">
<!-- Top Navigation -->
<div class="flex items-center p-6 pb-2 justify-between">
<button class="text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 p-2 rounded-full transition-colors">
<span class="material-symbols-outlined block">arrow_back</span>
</button>
<div class="flex-1 flex justify-center pr-10">
<div class="flex items-center gap-2">
<div class="size-8 bg-brand-teal rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xl">flight_takeoff</span>
</div>
<span class="text-slate-900 dark:text-slate-100 font-bold text-xl tracking-tight">Viaja Bem</span>
</div>
</div>
</div>
<!-- Hero Illustration Area (Subtle) -->
<div class="px-6 pt-4">
<div class="w-full h-40 bg-slate-50 dark:bg-slate-800/50 rounded-lg flex items-center justify-center border border-dashed border-slate-200 dark:border-slate-700 overflow-hidden relative" data-alt="Abstract secure shield and key pattern">
<span class="material-symbols-outlined text-brand-teal/20 text-8xl absolute -right-4 -bottom-4">lock_reset</span>
<span class="material-symbols-outlined text-brand-teal text-6xl">lock_open</span>
</div>
</div>
<!-- Content -->
<div class="p-6 pt-8 text-center">
<h2 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight mb-2">Recuperar Senha</h2>
<p class="text-slate-600 dark:text-slate-400 text-sm font-normal leading-relaxed mb-8">
                Insira seu e-mail cadastrado para receber instruções de redefinição.
            </p>
<form action="#" class="space-y-6 text-left" method="POST">
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold" for="email">
                        E-mail Corporativo
                    </label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 text-xl">mail</span>
</div>
<input class="form-input block w-full pl-10 pr-4 py-3 border border-slate-300 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus-teal transition-all text-sm" id="email" name="email" placeholder="exemplo@viajabem.com.br" required="" type="email"/>
</div>
</div>
<button class="w-full bg-primary hover:bg-[#e89a13] text-white font-bold py-4 px-6 rounded-lg transition-all shadow-md active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
<span>Enviar Link de Recuperação</span>
<span class="material-symbols-outlined text-xl">send</span>
</button>
</form>
<div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 text-center">
<p class="text-slate-500 dark:text-slate-400 text-xs">
                    Lembrou sua senha? 
                    <a class="text-brand-teal font-semibold hover:underline" href="#">Voltar ao login</a>
</p>
</div>
</div>
</div>
<!-- Security Footer -->
<div class="fixed bottom-6 left-0 right-0 text-center">
<div class="inline-flex items-center gap-2 px-4 py-2 bg-white/50 backdrop-blur-sm rounded-full border border-slate-200">
<span class="material-symbols-outlined text-slate-400 text-sm">verified_user</span>
<span class="text-slate-500 text-[10px] uppercase tracking-widest font-bold">Acesso Seguro &amp; Criptografado</span>
</div>
</div>
</body></html>
